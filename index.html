<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>NGson | Reliable Spaces for Growing Businesses</title>
    <meta name="description" content="NGson provides premium commercial warehouse rentals and flexible storage units in South Florida. Family-owned, trusted, and built for businesses of all sizes." />
    <meta name="keywords" content="warehouse rental, storage units, commercial space, South Florida, Doral, Miami, property management, industrial space" />
    <meta name="author" content="NGson Property Management" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="NGson | Reliable Spaces for Growing Businesses" />
    <meta property="og:description" content="Premium commercial warehouses and storage units in South Florida's most convenient industrial corridors." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NGson | Reliable Spaces for Growing Businesses" />
    <meta name="twitter:description" content="Premium commercial warehouses and storage units in South Florida." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Prevent dark mode flash -->
    <script>
      (function () {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
